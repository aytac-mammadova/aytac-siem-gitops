title: OWASP A01 - Path Traversal
id: a1b2c3d4-0003-4000-8000-000000000003
status: experimental
description: Detects directory traversal attempts in URLs
author: SOC team
date: 2026/06/30
tags:
  - attack.discovery
  - attack.t1083
logsource:
  category: webserver
detection:
  selection:
    cs-uri-stem|contains:
      - "../"
      - "..\\"
      - "%2e%2e%2f"
      - "%2e%2e/"
      - "/etc/passwd"
      - "/windows/win.ini"
  condition: selection
level: high
