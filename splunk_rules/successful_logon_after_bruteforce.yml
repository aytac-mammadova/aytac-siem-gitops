title: Explicit Credential Use (Potential Lateral Movement)
id: 7d3a0b7c-1234-4abc-9def-0123456789ab
status: experimental
description: |
    Detects logon attempts using explicit credentials (EventID 4648).
    Common indicator of lateral movement after credential theft
    (Mimikatz, pass-the-hash, RunAs abuse).
references:
    - https://attack.mitre.org/techniques/T1078/
author: SOC team
date: 2026/06/30
tags:
    - attack.lateral_movement
    - attack.defense_evasion
    - attack.t1078
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4648
    filter_machine:
        TargetUserName|endswith: '$'
    condition: selection and not filter_machine
level: medium
falsepositives:
    - Legitimate RunAs by administrators
    - Scheduled tasks with stored credentials
