title: PowerShell Download Cradle
id: 62a3b4c5-d6e7-8901-fabc-234567890123
status: stable
description: Şübhəli PowerShell download/execution pattern-lərini aşkarlayır (IEX, DownloadString, WebClient).
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: SOC team
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - 'DownloadString'
      - 'IEX('
      - 'Invoke-Expression'
      - 'Net.WebClient'
  condition: selection
level: high
tags:
  - attack.execution
  - attack.t1059.001
