title: OWASP A03 - Cross-Site Scripting
id: a1b2c3d4-0002-4000-8000-000000000002
status: experimental
description: Detects XSS payloads in URL parameters
author: SOC team
date: 2026/06/30
tags:
  - attack.execution
  - attack.t1059.007
logsource:
  category: webserver
detection:
  selection:
    cs-uri-query|contains:
      - "<script>"
      - "javascript:"
      - "onerror="
      - "onload="
      - "<img src=x"
      - "alert("
  condition: selection
level: high
