title: OWASP A03 - SQL Injection Attempt
id: a1b2c3d4-0001-4000-8000-000000000001
status: experimental
description: Detects common SQL injection patterns in HTTP requests
author: SOC team
date: 2026/06/30
tags:
  - attack.initial_access
  - attack.t1190
logsource:
  category: webserver
detection:
  selection:
    cs-uri-query|contains:
      - "' OR '1'='1"
      - "UNION SELECT"
      - "' OR 1=1--"
      - "'; DROP TABLE"
      - "SLEEP("
      - "BENCHMARK("
  condition: selection
level: high
