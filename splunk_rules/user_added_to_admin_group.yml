title: User Added to Privileged/Administrator Group
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: İstifadəçinin Administrators, Domain Admins və ya Enterprise Admins qrupuna əlavə edilməsini aşkarlayır (T1098 - privilege escalation).
references:
  - https://attack.mitre.org/techniques/T1098/
author: SOC team
date: 2026/06/28
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID:
      - 4728
      - 4732
      - 4756
    TargetUserName|contains:
      - 'Admins'
      - 'Administrators'
      - 'Domain Admins'
      - 'Enterprise Admins'
  condition: selection
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1098
