title: Kerberoasting — Weak RC4 Ticket Encryption
id: a6e7f8a9-b0c1-2345-defa-678901234567
status: stable
description: Zəif RC4-HMAC şifrələməsi ilə Kerberos service ticket sorğularını aşkarlayır (Kerberoasting).
references:
  - https://attack.mitre.org/techniques/T1558/003/
author: SOC team
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: '0x17'
    ServiceName|endswith: '$'
  filter:
    ServiceName: 'krbtgt'
  condition: selection and not filter
level: high
tags:
  - attack.credential_access
  - attack.t1558.003
