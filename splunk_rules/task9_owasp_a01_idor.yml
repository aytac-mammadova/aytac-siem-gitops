title: OWASP A01 - IDOR Enumeration
id: a1b2c3d4-0005-4000-8000-000000000005
status: experimental
description: Detects sequential ID enumeration suggesting IDOR exploitation
author: SOC team
date: 2026/06/30
tags:
  - attack.discovery
  - attack.t1087
logsource:
  category: webserver
detection:
  selection:
    cs-uri-stem|contains:
      - "/api/user/"
      - "/api/account/"
      - "/api/order/"
  filter:
    sc-status: 200
  condition: selection and filter
  timeframe: 1m
  count: 50
level: medium
