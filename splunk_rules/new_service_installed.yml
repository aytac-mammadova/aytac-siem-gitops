title: New Windows Service Installed
id: 39d0e1f2-a3b4-5678-cdef-901234567890
status: stable
description: Şübhəli yeni Windows xidmətinin yaradılmasını aşkarlayır (T1543.003 - persistence).
references:
  - https://attack.mitre.org/techniques/T1543/003/
author: SOC team
logsource:
  product: windows
  service: system
detection:
  selection:
    Provider_Name: 'Service Control Manager'
    EventID: 7045
  filter_legit:
    ServiceName|contains:
      - 'Windows Update'
      - 'Defender'
  condition: selection and not filter_legit
level: medium
tags:
  - attack.persistence
  - attack.t1543.003
