title: Windows Defender Real-Time Protection Disabled
id: 73b4c5d6-e7f8-9012-abcd-345678901234
status: stable
description: Windows Defender real-time və ya behavior monitoring-in deaktivləşdirilməsini aşkarlayır.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: SOC team
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'Set-MpPreference -DisableBehaviorMonitoring'
      - 'Set-MpPreference -DisableIOAVProtection'
  condition: selection
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.001
